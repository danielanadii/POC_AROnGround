<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>Toyota GR Supra Website AR</title>
    <link rel="stylesheet" href="./marker-ar.css" />
  </head>
  <body>
    <main class="web-ar-shell">
      <video id="cameraFeed" playsinline muted autoplay></video>
      <canvas id="cameraScene" aria-label="Toyota GR Supra camera AR view"></canvas>

      <section class="ar-top">
        <div>
          <p>Toyota GR Supra</p>
          <h1>Camera AR</h1>
        </div>
        <a href="./index.html" aria-label="Back to 3D viewer">Back</a>
      </section>

      <section class="ar-panel">
        <div class="slider-row">
          <label for="markerScale">Scale</label>
          <input id="markerScale" type="range" min="0.5" max="2" step="0.05" value="1" />
          <output id="markerScaleValue" for="markerScale">1.00x</output>
        </div>
        <div class="ar-status" id="markerStatus">Starting camera</div>
        <button class="marker-link" id="centerCar" type="button">Place car</button>
      </section>

      <button class="hotspot-dot" id="hotspotDot" type="button" aria-label="Open Supra hotspot"></button>

      <section class="hotspot-card" id="hotspotCard" aria-live="polite">
        <button id="closeHotspot" type="button" aria-label="Close hotspot">x</button>
        <p>Hotspot</p>
        <h2>GR Supra</h2>
        <span>Inline-six turbo coupe. Tap the green point again to revisit this note.</span>
      </section>

      <section class="secure-card" id="secureCard" aria-live="polite">
        <h2>Camera needs HTTPS</h2>
        <p>Website AR uses the browser camera. Open this page from your GitHub Pages HTTPS URL, not a local IP address.</p>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./camera-ar.js"></script>
  </body>
</html>
