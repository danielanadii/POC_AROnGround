<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Toyota GR Supra AR</title><meta itemprop="name" content="Toyota GR Supra AR"><meta name="twitter:title" content="Toyota GR Supra AR"><meta property="og:title" content="Toyota GR Supra AR"><meta property="og:site_name" content="Toyota GR Supra AR"><meta name="description" content="Place a Toyota GR Supra on the ground in mobile AR."><meta itemprop="description" content="Place a Toyota GR Supra on the ground in mobile AR."><meta property="og:description" content="Place a Toyota GR Supra on the ground in mobile AR."><meta name="twitter:description" content="Place a Toyota GR Supra on the ground in mobile AR."><style>html, body { margin: 0; min-height: 100%; background: #000; }
    #ar-boot { position: fixed; inset: 0; z-index: 10000; display: grid; place-items: center; padding: 24px; box-sizing: border-box; background: #050908; color: #f5fffc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #ar-boot.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; transition: opacity .35s ease, visibility .35s ease; }
    .ar-boot-card { width: min(100%, 380px); padding: 22px; border: 1px solid rgba(112,233,201,.34); border-radius: 8px; box-sizing: border-box; background: #10201c; box-shadow: 0 18px 50px rgba(0,0,0,.38); }
    .ar-boot-card h1 { margin: 0; font-size: 32px; line-height: 1.08; letter-spacing: 0; }
    .ar-boot-card p { margin: 12px 0 22px; color: #b4c9c1; font-size: 15px; line-height: 1.45; }
    #ar-boot-start { width: 100%; min-height: 50px; border: 0; border-radius: 7px; background: #1ed7ac; color: #04100d; font: 800 16px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #ar-boot-start:disabled { opacity: .55; }
    .ar-boot-spinner { display: none; width: 28px; height: 28px; margin: 0 0 18px; border: 3px solid rgba(112,233,201,.24); border-top-color: #70e9c9; border-radius: 50%; animation: ar-boot-spin .8s linear infinite; }
    #ar-boot.is-loading .ar-boot-spinner { display: block; }
    #ar-boot.is-loading #ar-boot-start { display: none; }
    @keyframes ar-boot-spin { to { transform: rotate(360deg); } }</style><meta property="og:image" content="https://8thwall.org/studio-world-effects-example/assets/preview.png"></head><body><section id="ar-boot" aria-live="polite"><div class="ar-boot-card"><div class="ar-boot-spinner" aria-hidden="true"></div><h1>See it on the ground</h1><p id="ar-boot-copy">Allow motion access so the Supra stays anchored in your space.</p><button id="ar-boot-start" type="button">Start AR</button></div></section><script>(() => {
    const boot = document.querySelector('#ar-boot')
    const start = document.querySelector('#ar-boot-start')
    const copy = document.querySelector('#ar-boot-copy')
    const loadScript = (src, options = {}) => new Promise((resolve, reject) => {
      const script = document.createElement('script')
      script.src = src
      Object.assign(script, options)
      if (src.includes('@8thwall/engine-binary')) {
        script.dataset.preloadChunks = 'slam'
      }
      script.onload = resolve
      script.onerror = reject
      document.head.appendChild(script)
    })
    const requestPermission = (eventType) => eventType && eventType.requestPermission
      ? eventType.requestPermission()
      : Promise.resolve('granted')
    const preloadSupra = async () => {
      const response = await fetch('./assets/toyota_gr_supra.glb', {cache: 'force-cache'})
      if (!response.ok) {
        throw new Error('The 3D model could not be downloaded.')
      }
      const total = Number(response.headers.get('content-length'))
      if (!response.body || !total) {
        await response.arrayBuffer()
        return
      }
      const reader = response.body.getReader()
      let loaded = 0
      while (true) {
        const {done, value} = await reader.read()
        if (done) {
          return
        }
        loaded += value.byteLength
        copy.textContent = `Loading 3D vehicle ${Math.min(100, Math.round(loaded / total * 100))}%`
      }
    }

    start.addEventListener('click', async () => {
      start.disabled = true
      copy.textContent = 'Requesting motion access...'
      try {
        // Start both requests in the same trusted tap. iOS otherwise makes 8th Wall prompt again.
        const permissions = await Promise.all([
          requestPermission(window.DeviceMotionEvent),
          requestPermission(window.DeviceOrientationEvent),
        ])
        if (permissions.some(permission => permission !== 'granted')) {
          start.disabled = false
          copy.textContent = 'Motion access is needed to anchor the car on the ground.'
          return
        }
        boot.classList.add('is-loading')
        copy.textContent = 'Loading 3D vehicle...'
        await preloadSupra()
        window.__supraAssetReady = true
        copy.textContent = 'Opening your camera...'
        await loadScript('./external/runtime/runtime.js')
        await loadScript('https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js', {
          async: true,
          crossOrigin: 'anonymous',
        })
        await loadScript('./bundle.js')
        copy.textContent = 'Preparing the 3D vehicle...'
        if (!window.__supraModelReady) {
          await new Promise(resolve => window.addEventListener('supra-model-ready', resolve, {once: true}))
        }
        boot.classList.add('is-hidden')
      } catch {
        start.disabled = false
        copy.textContent = 'Unable to start AR. Please try again.'
      }
    })
  })()</script></body></html>
