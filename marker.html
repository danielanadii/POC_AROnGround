<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hiro Marker</title>
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #f7f9fc;
        color: #172033;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        gap: 20px;
        padding: 24px;
      }

      img {
        width: min(72vw, 460px);
        aspect-ratio: 1;
        border: 14px solid #ffffff;
        box-shadow: 0 18px 50px rgba(40, 58, 82, 0.18);
      }

      div {
        max-width: 34rem;
        text-align: center;
      }

      h1,
      p {
        margin: 0;
      }

      p {
        margin-top: 8px;
        color: #68758a;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <img
        alt="Hiro AR marker"
        src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
      />
      <div>
        <h1>Hiro marker</h1>
        <p>Print this page or open it on another screen, then point Website AR at the square marker.</p>
      </div>
    </main>
  </body>
</html>
